<!--Perfil de usuario-->
<main *ngIf="usuarioLogeado">
    <section class="container-perfil">
        <div class="row justify-content-center mx-2">
            <div class="col-12 col-sm-10 col-md-8 col-lg-9 bg-light rounded shadow my-4 my-lg-5 overflow-hidden">
                <div class="row g-0 align-items-stretch">

                    <div class="col-lg-5 d-none d-lg-flex p-0" style="position: relative;">
                        <img src="assets/img/login.jpg" alt="Perfil AniMug" class="w-100 h-100 loginImage">
                    </div>

                    <div class="col-12 col-lg-7 p-4 p-lg-5">
                        <h2 class="text-center mb-4 text-secondary">Perfil de Usuario</h2>

                        <div *ngIf="mensajeAlert"
                            class="alert alert-{{ mensajeAlert.tipo }} alert-dismissible fade show" role="alert">
                            {{ mensajeAlert.texto }}
                        </div>

                        <div class="card shadow-sm border-0 mb-4 p-3 bg-white">
                            <div class="d-flex align-items-center justify-content-between">
                                <div class="d-flex align-items-center gap-3">
                                    <!-- <img src="assets/img/userDefault.jpg" alt="Foto de perfil"
                                        class="rounded-circle perfilImage"> -->
                                    <div>
                                        <h5 class="m-0 h6 fw-bold text-dark">{{ usuarioLogeado.nombre }}</h5>
                                        <small class="text-muted d-block" style="font-size: 0.85rem;">{{
                                            usuarioLogeado.email }}</small>
                                        <span class="badge bg-secondary mt-1 text-uppercase">{{ usuarioLogeado.role
                                            }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm border-0 p-4 bg-white">
                            <div class="d-flex flex-column gap-3">

                                <div class="d-flex justify-content-center justify-content-sm-start">
                                    <button routerLink="/mis-compras"
                                        class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-bag-check"></i> <span>Mis Compras</span>
                                    </button>
                                </div>

                                <div class="d-flex justify-content-center justify-content-sm-start">
                                    <button
                                        class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-chat-left-text"></i> <span>Mensajes</span>
                                    </button>
                                </div>

                                <div class="d-flex justify-content-center justify-content-sm-start">
                                    <button
                                        class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-ticket-perforated"></i> <span>Cupones</span>
                                    </button>
                                </div>

                                <div class="d-flex justify-content-center justify-content-sm-start">
                                    <button type="button"
                                        class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2"
                                        data-bs-toggle="modal" data-bs-target="#modalDireccion">
                                        <i class="bi bi-sliders"></i><span>Direcciones</span>
                                    </button>
                                </div>

                                <div class="d-flex justify-content-center justify-content-sm-start">
                                    <button
                                        class="btn btn-outline-primary btn-custom-profile d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-telephone"></i><span>Contacto</span>
                                    </button>
                                </div>

                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </section>
</main>
<!--modal dirección de despacho -->
<div class="modal fade" id="modalDireccion" tabindex="-1" aria-labelledby="modalDireccionLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-secondary" id="modalDireccionLabel">Dirección de despacho</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="direccionForm" (ngSubmit)="onGuardarDireccion()">

                    <div class="mb-3">
                        <label for="inputDireccion" class="form-label fw-semibold">Dirección</label>
                        <input type="text" class="form-control" id="inputDireccion" formControlName="direccion"
                            placeholder="Calle, número, departamento..."
                            [ngClass]="{'is-invalid': campoInvalido('direccion')}">

                        <div *ngIf="campoInvalido('direccion')" class="invalid-feedback">
                            <span *ngIf="controles['direccion'].errors?.['required']">La dirección es
                                obligatoria.</span>
                            <span *ngIf="controles['direccion'].errors?.['minlength']">Debe tener al menos 5
                                caracteres.</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4 justify-content-center">
                        <button type="submit" class="btn btn-primary w-50">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
