<!--Header-->
<header class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm py-3" id="inicio">
    <div class="container-fluid px-md-5">
        <a class="navbar-brand d-flex align-items-center gap-2 m-0" routerLink="/home">
            <img src="assets/img/logo.png" alt="Logo de aniMug" height="50" class="d-inline-block animacion_logo">
            <h1 class="h3 m-0 fw-bold text-primary">aniMug</h1>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacion"
            aria-controls="menuNavegacion" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="menuNavegacion">
            <ul class="navbar-nav align-items-center gap-3 mt-3 mt-lg-0 ms-auto me-lg-3">
                <li class="nav-item">
                    <a class="nav-link p-0 text-primary fw-semibold link-primary" routerLink="/home">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-0 text-primary fw-semibold link-primary"
                        href="index.html#categoria">Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-0 text-primary fw-semibold link-primary"
                        href="index.html#contacto">Contacto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-0 text-danger position-relative" routerLink="/carrito"
                        title="Carrito de compras">
                        <i class="bi bi-cart fs-4"></i>
                        <span *ngIf="totalProductos > 0"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            {{ totalProductos }}
                        </span>
                    </a>
                </li>
            </ul>
            <div class="d-flex flex-column flex-lg-row gap-2 mt-2 mt-lg-0" *ngIf="authService.autenticado">
                <a *ngIf="rolUsuario === 'admin'" class="btn btn-warning fw-bold btn-sm d-flex align-items-center gap-1"
                    routerLink="/adminPanel">
                    <i class="bi bi-shield-lock-fill"></i> Panel Admin
                </a>
                <a *ngIf="rolUsuario === 'cliente' || rolUsuario === 'admin'"
                    class="nav-link text-primary fw-bold d-flex align-items-center gap-2 py-1 px-2 border rounded bg-light"
                    routerLink="/perfil" style="transition: all 0.3s ease;">
                    <i class="bi bi-person-circle fs-5 text-primary"></i>
                </a>

                <button class="btn btn-link text-danger fw-semibold text-decoration-none p-0 align-middle"
                    (click)="logout()">
                    Cerrar Sesión
                </button>
            </div>

            <div class="d-flex flex-column flex-lg-row gap-2 mt-2 mt-lg-0" *ngIf="!authService.autenticado">
                <a class="btn btn-danger fw-semibold" routerLink="/login">Iniciar Sesión</a>
                <a class="btn btn-primary fw-semibold" routerLink="/registro">Registrarse</a>
            </div>
        </div>
    </div>
</header>
