version: '3.8'

services:
  # 1. El Proxy Inverso (La única puerta de entrada)
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80" # Ahora entras a tu app simplemente desde http://localhost (sin puertos)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - angular-app
      - api-server

  # 2. Tu Frontend Angular SSR (Oculto en la red interna)
  angular-app:
    build:
      context: .
      dockerfile: Dockerfile
    # 👇 AÑADE ESTAS DOS LÍNEAS AQUÍ:
    environment:
      - ALLOWED_HOSTS=localhost,angular-app,127.0.0.1
    # 3. Tu API con json-server (Oculto en la red interna y seguro)
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - .:/api
    # Ya no necesita ports: aquí, Nginx le habla de forma interna por el puerto 3000
