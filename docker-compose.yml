version: '3.8'

services:
  # 1. Proxy Inverso 
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - angular-app
      - api-server

  # 2. Tu Frontend Angular SSR 
  angular-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ALLOWED_HOSTS=localhost,angular-app,127.0.0.1
    # 3. Tu API con json-server 
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - .:/api
